<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AZFARUL // UNKNOWN_ORIGIN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Mono&display=swap');

        :root {
            --raw-red: #ff003c;
            --terminal-green: #00ff41;
            --dark-void: #020202;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--dark-void); 
            color: white; 
            font-family: 'Space Mono', monospace;
            overflow: hidden;
            cursor: crosshair;
        }

        /* Scanline Overlay - Makes the screen feel like a CRT monitor */
        body::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            z-index: 100;
            pointer-events: none;
        }

        #terminal-overlay {
            position: absolute;
            top: 20px; left: 20px;
            font-size: 10px;
            color: var(--terminal-green);
            z-index: 50;
            text-transform: uppercase;
        }

        .main-stage {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 8vw;
            margin: 0;
            line-height: 0.8;
            position: relative;
            letter-spacing: -5px;
            transform: skewX(-10deg);
        }

        .glitch-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: transparent;
        }

        /* The "Red-Zone" - Visible on hover */
        .identity:hover {
            color: var(--raw-red);
            text-shadow: 5px 0 #fff, -5px 0 var(--terminal-green);
            animation: shake 0.1s infinite;
        }

        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            50% { transform: translate(-1px, -2px) rotate(-1deg); }
            100% { transform: translate(1px, 2px) rotate(1deg); }
        }

        #glitch-canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: -1;
            filter: contrast(200%) brightness(150%);
        }
    </style>
</head>
<body>

<div id="terminal-overlay">
    [STATUS: CRITICAL]<br>
    [USER: AZFARUL_HOQUE_CHOWDHURY]<br>
    [LOCATION: BRACU_CSE_CORE]<br>
    [ENGINES: PYTHON_DJANGO_ML_LARAVEL]<br>
    [CORE_TEMP: OPTIMAL]
</div>

<div class="main-stage">
    <div class="identity">
        <h1 id="name-main">AZFARUL</h1>
        <h1 style="font-size: 4vw; color: #444;">HOQUE CHOWDHURY</h1>
    </div>
</div>

<canvas id="glitch-canvas"></canvas>

<script>
    const canvas = document.getElementById('glitch-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
