<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AZFARUL // SCHEMATIC_01</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;800&display=swap');

        :root {
            --accent: #ffffff;
            --bg: #000000;
            --line: rgba(255, 255, 255, 0.1);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden; cursor: none;
        }

        /* The Measurement Cursor */
        #caliper {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            display: flex;
            align-items: center;
        }
        .caliper-line {
            height: 1px; background: var(--accent); position: absolute;
        }
        #coords {
            font-size: 10px; margin-left: 20px; color: var(--accent);
            letter-spacing: 2px;
        }

        /* Glass HUD Overlay */
        #hud {
            position: absolute;
            top: 40px; left: 40px; bottom: 40px; right: 40px;
            border: 1px solid var(--line);
            pointer-events: none;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            padding: 20px;
        }

        .hero-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 5;
        }

        h1 {
            font-weight: 800; font-size: 6vw;
            margin: 0; letter-spacing: -2px;
            opacity: 0;
        }

        .status-bar {
            font-size: 12px; color: var(--line);
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="caliper">
    <div class="caliper-line" style="width: 100vw; left: -50vw;"></div>
    <div class="caliper-line" style="height: 100vh; width: 1px; top: -50vh; left: 0;"></div>
    <div id="coords">X:000 Y:000</div>
</div>

<div id="hud">
    <div class="status-bar">SYSTEM: AZFARUL_OS // BUILD.V4</div>
    <div class="status-bar">CREATIVE CHEAT CODE // ENGAGED</div>
</div>

<div class="hero-container">
    <h1 id="main-name">AZFARUL</h1>
    <div id="sub-title" style="font-weight: 100; letter-spacing: 15px;">CSE ARCHITECT</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<script>
    // --- 1. The Caliper Cursor Logic ---
    const caliper = document.getElementById('caliper');
    const coords = document.getElementById('coords');
    
    window.addEventListener('mousemove', (e) => {
        gsap.to(caliper, { x: e.clientX, y: e.clientY, duration: 0.1 });
        coords.innerHTML = `X:${e.clientX.toString().padStart(3, '0')} Y:${e.clientY.toString().padStart(3, '0')}`;
    });

    // --- 2. The 3D Wireframe Scene ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Create an Infinite Grid
    const grid = new THREE.GridHelper(100, 50, 0x444444, 0x222222);
    grid.rotation.x = Math.PI / 2;
    scene.add(grid);

    camera.position.z = 5;

    // --- 3. The Opening Sequence (The "Assembly") ---
    const nameText = document.getElementById('main-name');
    
    window.onload = () => {
        // Animate the grid coming toward the screen
        gsap.from(grid.position, { z: -50, duration: 3, ease: "expo.out" });
        
        // "Draft" the name onto the screen
        gsap.to(nameText, { 
            opacity: 1, 
            duration: 2, 
            delay: 1,
            onStart: () => {
                nameText.style.filter = "blur(10px)";
                gsap.to(nameText, { filter: "blur(0px)", duration: 1.5 });
            }
        });
    };

    // --- 4. Interactive Physics ---
    function animate() {
        requestAnimationFrame(animate);
        
        // Subtle tilt based on mouse position
        grid.rotation.y += 0.001;
        grid.rotation.z += 0.0005;

        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
