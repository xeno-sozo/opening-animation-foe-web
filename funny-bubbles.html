<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #0a0a0a; margin: 0; overflow: hidden; font-family: 'JetBrains Mono', monospace; cursor: crosshair; }
        #canvas-container { perspective: 1000px; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .grid {
            width: 800px; height: 800px;
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: rotateX(60deg) rotateZ(45deg);
            position: relative; border: 1px solid #444;
        }
        .block {
            position: absolute; width: 100px; height: 100px;
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #0ff;
            box-shadow: -20px 20px 50px rgba(0, 255, 255, 0.2);
            transition: 0.3s; color: #0ff; display: flex; align-items: center; justify-content: center;
        }
        .block:hover { transform: translateZ(50px); background: rgba(0, 255, 255, 0.3); }
        #cursor-stats { position: fixed; bottom: 20px; left: 20px; color: #666; font-size: 10px; }
    </style>
</head>
<body>
    <div id="cursor-stats">X: 0.00 | Y: 0.00 | Z: 0.00</div>
    <div id="canvas-container">
        <div class="grid" id="main-grid">
            <div class="block" style="top: 100px; left: 100px;">[DJANGO]</div>
            <div class="block" style="top: 300px; left: 100px;">[ML_DATA]</div>
            <div class="block" style="top: 100px; left: 300px;">[LARAVEL]</div>
            <div class="block" style="top: 500px; left: 400px;">[C_CORE]</div>
        </div>
    </div>
    <script>
        const grid = document.getElementById('main-grid');
        const stats = document.getElementById('cursor-stats');

        window.addEventListener('mousemove', (e) => {
            let rotateY = (e.clientX / window.innerWidth - 0.5) * 20;
            let rotateX = (e.clientY / window.innerHeight - 0.5) * 20 + 60;
            grid.style.transform = `rotateX(${rotateX}deg) rotateZ(45deg) rotateY(${rotateY}deg)`;
            stats.innerText = `X: ${e.clientX} | Y: ${e.clientY} | Z: ACTIVE`;
        });
    </script>
</body>
</html>
