<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { background: #000; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* The Secret Sauce: Blur + High Contrast = Liquid */
        #container {
            width: 100%; height: 100%; filter: blur(25px) contrast(50);
            background: #000; display: flex; justify-content: center; align-items: center;
        }

        .blob {
            background: #7000ff; /* Alien Purple */
            border-radius: 50%; position: absolute;
            width: 200px; height: 200px;
            animation: move 10s infinite alternate;
            box-shadow: 0 0 50px #7000ff;
        }

        #mouse-blob {
            width: 150px; height: 150px; background: #00ffcc; /* Alien Cyan */
            position: fixed; pointer-events: none; z-index: 100;
        }

        @keyframes move {
            0% { transform: translate(-100px, -100px); }
            100% { transform: translate(100px, 100px); }
        }

        #text-overlay {
            position: absolute; z-index: 1000; color: #fff;
            text-align: center; pointer-events: none;
            mix-blend-mode: difference; /* Makes text visible over any color */
        }
        h1 { font-family: 'Arial Black'; font-size: 8vw; margin: 0; letter-spacing: -5px; }
    </style>
</head>
<body>
    <div id="text-overlay">
        <h1>AZFARUL</h1>
        <p style="letter-spacing: 15px;">BIO_DIGITAL_SYNTHESIS</p>
    </div>

    <div id="container">
        <div class="blob" style="width:300px; height:300px; left:30%; top:20%;"></div>
        <div class="blob" style="width:250px; height:250px; right:20%; bottom:30%; animation-delay: -5s;"></div>
        <div id="mouse-blob" class="blob"></div>
    </div>

    <script>
        const mouseBlob = document.getElementById('mouse-blob');
        window.addEventListener('mousemove', (e) => {
            // Smoothly move the liquid blob to follow mouse
            mouseBlob.style.left = (e.clientX - 75) + 'px';
            mouseBlob.style.top = (e.clientY - 75) + 'px';
        });
    </script>
</body>
</html>
