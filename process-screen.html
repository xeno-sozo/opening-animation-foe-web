<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        :root { --line: #00f2ff; --bg: #000b0d; }
        body { background: var(--bg); color: var(--line); font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; }
        
        /* The Scanning Reticle */
        #scanner {
            position: fixed; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--line), transparent);
            box-shadow: 0 0 15px var(--line);
            z-index: 100; animation: scan 4s linear infinite;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        /* Blueprint Grid */
        #grid {
            position: absolute; width: 200%; height: 200%;
            background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
            background-size: 50px 50px; opacity: 0.1; transform: rotateX(60deg) translateY(-20%);
        }

        .module {
            border: 1px solid var(--line); padding: 40px; position: relative;
            background: rgba(0, 242, 255, 0.05); backdrop-filter: blur(5px);
            clip-path: polygon(0 0, 90% 0, 100% 10%, 100% 100%, 10% 100%, 0 90%);
        }
        #ui-main { height: 100vh; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>
    <div id="scanner"></div>
    <div id="grid"></div>
    <div id="ui-main">
        <div class="module">
            <h2 style="margin:0; letter-spacing: 10px;">SCHEMATIC_v3.0</h2>
            <h1 style="font-size: 4rem; color: #fff;">AZFARUL</h1>
            <p>PRECISION_ENGINEERING // CREATIVE_CHEAT_CODE</p>
            <div style="border-top: 1px solid var(--line); margin-top: 20px; font-size: 10px;">
                COORD: 23.8103° N, 90.4125° E
            </div>
        </div>
    </div>
</body>
</html>
